<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register</title>
</head>

<body style="margin:0; padding:20px; background:#e6f2ff; font-family:Arial;">

<div style="background:white; width:900px; margin:auto; display:flex; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); overflow:hidden;">

  <!-- LEFT SIDE -->
  <div style="flex:1; background:#0d2b52; padding:20px; display:flex; flex-direction:column; gap:20px;">

    <!-- BLOCK 1 -->
    <div style="display:flex; flex-direction:column; gap:10px;">
      
      <!-- IMAGE BOX -->
      <div style="background:white; border-radius:12px; padding:10px;">
        <img src="1 pic.jpeg" style="width:100%; border-radius:10px;">
      </div>

      <!-- TEXT BOX -->
      <div style="background:white; border-radius:10px; padding:10px; display:flex; gap:8px; align-items:center;">
        <span style="background:#0d2b52; color:white; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px;">1</span>
        <span style="font-size:12px;">Register with us, enter your details and click on <b>Register</b></span>
      </div>

    </div>

    <!-- BLOCK 2 -->
    <div style="display:flex; flex-direction:column; gap:10px;">
      
      <!-- IMAGE BOX -->
      <div style="background:white; border-radius:12px; padding:10px;">
        <img src="2 pic.jpeg" style="width:100%; border-radius:10px;">
      </div>

      <!-- TEXT BOX -->
      <div style="background:white; border-radius:10px; padding:10px; display:flex; gap:8px; align-items:center;">
        <span style="background:#ff4d6d; color:white; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px;">2</span>
        <span style="font-size:12px;">Select "7 day trial" or Pay for <b>Enterprise Package</b></span>
      </div>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div style="flex:2; padding:30px; justify-contant: space around;">
    
    <h2 style="margin-bottom:20px;">Register</h2>

    <div style="display:flex; gap:40px; margin-bottom:15px;">
      <div style="flex:1;">
        <label>User Name</label>
        <input type="text" placeholder="Sanoj" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
      </div>

      <div style="flex:1;">
        <label>Email</label>
        <input type="email" placeholder="Sanoj@gmail.com" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
      </div>
    </div>

    <div style="display:flex; gap:40px; margin-bottom:15px;">
      <div style="flex:1;">
        <label>Contact Number</label>
        <input type="text" placeholder="+94 009 009 119" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
      </div>

      <div style="flex:1;">
        <label>Address</label>
        <input type="text" placeholder="No.190/A Church lane" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
      </div>
    </div>

    <div style="display:flex; gap:40px;">
      <div style="flex:1;">
        <label>Password</label>
        <input type="password" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
      </div>

      <div style="flex:1;">
        <label>Confirm Password</label>
        <input type="password" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
        <small style="color:red;">Incorrect Password</small>
      </div>
    </div>

    <div style="display:flex; gap:15px; margin-top:25px;">
      <button style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; background:#eee;">
        Cancel
      </button>

      <button style="flex:1; padding:10px; border-radius:8px; border:none; background:#0d2b52; color:white;">
        Register
      </button>
    </div>

  </div>

</div>

</body>
</html>
